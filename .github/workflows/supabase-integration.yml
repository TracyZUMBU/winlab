# Tests d’intégration Jest contre Supabase **local** (Docker sur le runner).
# Séparé de `.github/workflows/ci.yml` : plus lourd, nécessite la CLI + stack locale.
#
# Déclenchement optionnel sur PR (désactivé par défaut — activer si besoin) :
#   pull_request:
#     branches: [main]

name: Supabase integration tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  # pull_request:
  #   branches: [main]

permissions:
  contents: read

concurrency:
  group: supabase-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Integration tests (Jest + local Supabase)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Aligné sur `.github/workflows/ci.yml`
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.2

      # Réutilise le script racine : démarrage + `db reset` (migrations + seed)
      - name: Start Supabase locally and reset database
        run: npm run supabase:test:prepare

      # `loadIntegrationTestEnv` (mobile) exige un fichier `.env.test.local` ;
      # on le dérive des clés exposées par `supabase status` (même schéma que en local).
      - name: Write Jest .env.test.local from supabase status
        run: |
          set -euo pipefail
          supabase status -o env --workdir . \
            | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY)=' \
            | sed -e 's/^API_URL=/SUPABASE_URL=/' \
                  -e 's/^ANON_KEY=/SUPABASE_ANON_KEY=/' \
                  -e 's/^SERVICE_ROLE_KEY=/SUPABASE_SERVICE_ROLE_KEY=/' \
            > apps/mobile/.env.test.local
          cp apps/mobile/.env.test.local apps/admin/.env.test.local
          test "$(wc -l < apps/mobile/.env.test.local | tr -d ' ')" -eq 3
          grep -Eq '^SUPABASE_URL=http://(127\.0\.0\.1|localhost):54321$' apps/mobile/.env.test.local
      - name: Run integration tests (admin)
        run: npm run test:integration -w admin

      - name: Run integration tests (mobile)
        run: npm run test:integration -w mobile
